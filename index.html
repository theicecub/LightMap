<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LightMap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><polygon points='12,2 14.8,9.2 22,12 14.8,14.8 12,22 9.2,14.8 2,12 9.2,9.2' fill='%231D9E75'/></svg>">
<meta name="description" content="Интерактивная карта опасных световых бликов от фасадов зданий Астаны для водителей">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
<script>
(function () {
    let theme = 'dark';
    try {
      const saved = localStorage.getItem('theme');
      if (saved === 'light' || saved === 'dark') theme = saved;
    } catch (err) {
      console.warn('[Theme] localStorage error:', err);
    }
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
  <polygon
    points="12,2 14.8,9.2 22,12 14.8,14.8 12,22 9.2,14.8 2,12 9.2,9.2"
    fill="var(--icon-color, #000)"
  />
</svg>
        </div>
        <div>
          <h1>LightMap</h1>
          <p class="subtitle">Карта опасных световых зон от фасадов зданий для водителей</p>
        </div>
      </div>

      <div class="topbar-controls">
        <div class="lang-switcher" id="langSwitcher">
          <button class="lang-btn lang-btn--active" data-lang="ru" aria-label="Русский" title="Русский">
            <span class="lang-flag">🇷🇺</span>
          </button>
          <button class="lang-btn" data-lang="en" aria-label="English" title="English">
            <span class="lang-flag">🇬🇧</span>
          </button>
        </div>

        <label class="switch" id="themeToggle">
	<input class="switch__input" type="checkbox" role="switch" />
	<span class="switch__icon">
		<span class="switch__icon-part switch__icon-part--1"></span>
		<span class="switch__icon-part switch__icon-part--2"></span>
		<span class="switch__icon-part switch__icon-part--3"></span>
		<span class="switch__icon-part switch__icon-part--4"></span>
		<span class="switch__icon-part switch__icon-part--5"></span>
		<span class="switch__icon-part switch__icon-part--6"></span>
		<span class="switch__icon-part switch__icon-part--7"></span>
		<span class="switch__icon-part switch__icon-part--8"></span>
		<span class="switch__icon-part switch__icon-part--9"></span>
		<span class="switch__icon-part switch__icon-part--10"></span>
		<span class="switch__icon-part switch__icon-part--11"></span>
	</span>
	<span class="switch__sr">Dark Mode</span>
        </label>
      </div>
    </div>

    <div class="topbar-secondary">
      <div class="weather-strip" id="weatherStrip">
        <div class="weather-strip-loading">
          <span class="weather-spinner"></span>
          <span>Загрузка погоды…</span>
        </div>
      </div>
    </div>
  </header>

  <main class="map-wrap">
    <div id="map"></div>

    <!-- Safe Route Panel -->
    <div class="route-panel" id="routePanel">
      <div class="route-panel-header">
        <h3 class="route-panel-title">Безопасный маршрут</h3>
        <button class="route-panel-toggle" id="routePanelToggle" aria-label="Toggle route panel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>

      <div class="route-panel-content" id="routePanelContent">
        <div class="route-input-group">
          <div class="route-input-row">
            <span class="route-input-pin route-input-pin--a">A</span>
            <input type="text" id="routeInputA" class="route-input" placeholder="Откуда" autocomplete="off" />
            <button class="route-pick-btn" data-pick="A" title="Выбрать на карте">📍</button>
            <div class="route-suggestions" id="routeSuggestionsA"></div>
          </div>

          <div class="route-input-row">
            <span class="route-input-pin route-input-pin--b">B</span>
            <input type="text" id="routeInputB" class="route-input" placeholder="Куда" autocomplete="off" />
            <button class="route-pick-btn" data-pick="B" title="Выбрать на карте">📍</button>
            <div class="route-suggestions" id="routeSuggestionsB"></div>
          </div>
        </div>

        <div class="route-actions">
          <button class="route-btn route-btn--primary" id="routeBuildBtn">Построить маршрут</button>
          <button class="route-btn route-btn--secondary" id="routeClearBtn">Очистить</button>
        </div>

        <div class="route-error" id="routeError" style="display:none;"></div>
      </div>
    </div>

  </main>

</div>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="script.js"></script>
<script src="route.js"></script>
</body>
</html>
