<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Световые блики Астаны — карта для водителей</title>
<meta name="description" content="Интерактивная карта опасных световых бликов от фасадов зданий Астаны для водителей">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <header class="topbar">
    <div class="topbar-row">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="4.6" fill="var(--icon-color, #000)"/>
            <g stroke="var(--icon-color, #000)" stroke-width="1.8" stroke-linecap="round">
              <line x1="12" y1="1.6" x2="12" y2="4.4"/>
              <line x1="12" y1="19.6" x2="12" y2="22.4"/>
              <line x1="1.6" y1="12" x2="4.4" y2="12"/>
              <line x1="19.6" y1="12" x2="22.4" y2="12"/>
              <line x1="4.4" y1="4.4" x2="6.3" y2="6.3"/>
              <line x1="17.7" y1="17.7" x2="19.6" y2="19.6"/>
              <line x1="4.4" y1="19.6" x2="6.3" y2="17.7"/>
              <line x1="17.7" y1="6.3" x2="19.6" y2="4.4"/>
            </g>
          </svg>
        </div>
        <div>
          <h1>Световые блики Астаны</h1>
          <p class="subtitle">Карта опасных бликов от фасадов зданий для водителей</p>
        </div>
      </div>



      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему" aria-pressed="false">
        <span class="toggle-icon" aria-hidden="true">☀️</span>
        <span class="toggle-label">Светлая тема</span>
      </button>
    </div>

    <div class="filters" role="group" aria-label="Фильтр по времени суток">
      <button class="filter-btn active" data-filter="all" aria-pressed="true">Все</button>
      <button class="filter-btn" data-filter="morning" aria-pressed="false">Утро</button>
      <button class="filter-btn" data-filter="evening" aria-pressed="false">Вечер</button>
    </div>
  </header>

  <main class="map-wrap">
    <div id="map"></div>

    <div class="legend">
      <h4>Уровень освещённости</h4>
      <div class="legend-item"><i class="dot dot--danger"></i><span>Опасно — &gt; 50 000 лк</span></div>
      <div class="legend-item"><i class="dot dot--warning"></i><span>Внимание — 10 000–50 000 лк</span></div>
      <div class="legend-item"><i class="dot dot--safe"></i><span>Безопасно — &lt; 10 000 лк</span></div>
    </div>

  </main>

</div>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="script.js"></script>
</body>
</html>
